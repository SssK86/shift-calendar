<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>交番表シフトカレンダー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      background: #f5f5f5;
      color: #222;
    }

    h1 {
      margin-bottom: 10px;
    }

    .container {
      background: #fff;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    label {
      font-weight: bold;
      margin-right: 6px;
    }

    input, button, textarea {
      padding: 8px;
      margin: 5px 0 10px 0;
      font-size: 14px;
      box-sizing: border-box;
    }

    input[type="number"],
    input[type="date"] {
      width: 180px;
      max-width: 100%;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      font-family: inherit;
      line-height: 1.5;
    }

    button {
      cursor: pointer;
      background: #1976d2;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 10px 16px;
    }

    button:hover {
      background: #125ca1;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .field {
      display: flex;
      flex-direction: column;
      min-width: 180px;
    }

    .summary {
      margin-top: 12px;
      font-size: 14px;
      line-height: 1.8;
    }

    .error {
      color: #c62828;
      font-weight: bold;
      margin-top: 10px;
    }

    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      background: #ccc;
      border: 1px solid #ccc;
    }

    .cell {
      background: #fff;
      min-height: 96px;
      padding: 6px;
      font-size: 14px;
    }

    .header {
      background: #eceff1;
      text-align: center;
      font-weight: bold;
      min-height: auto;
    }

    .day {
      font-weight: bold;
      margin-bottom: 6px;
    }

    .shift {
      display: inline-block;
      margin-top: 4px;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 12px;
      line-height: 1.4;
      word-break: break-word;
    }

    .route {
      background: #d0e7ff;
      color: #0d47a1;
    }

    .ake {
      background: #fff3cd;
      color: #7a5600;
    }

    .off {
      background: #d4f5d4;
      color: #1b5e20;
    }

    .blank {
      background: #fafafa;
    }

    .legend {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
      font-size: 13px;
    }

    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-block;
    }

    .dot-route { background: #d0e7ff; }
    .dot-ake { background: #fff3cd; }
    .dot-off { background: #d4f5d4; }

    @media (max-width: 700px) {
      .calendar {
        font-size: 12px;
      }

      .cell {
        min-height: 82px;
        padding: 4px;
      }

      .shift {
        font-size: 11px;
        padding: 2px 6px;
      }
    }
  </style>
</head>
<body>

  <h1>交番表シフトカレンダー</h1>

  <div class="container">
    <div class="row">
      <div class="field">
        <label for="year">年</label>
        <input type="number" id="year">
      </div>

      <div class="field">
        <label for="month">月</label>
        <input type="number" id="month" min="1" max="12">
      </div>

      <div class="field">
        <label for="baseDate">基準日</label>
        <input type="date" id="baseDate">
      </div>

      <div class="field">
        <label for="startIndex">開始交番番号</label>
        <input type="number" id="startIndex" min="1">
      </div>
    </div>

    <div class="field">
      <label for="pattern">交番表（1行に1件）</label>
      <textarea id="pattern">17行路
明け
9行路
明け
休み
休み

平2行路
休み
休み</textarea>
    </div>

    <button onclick="generate()">カレンダー生成</button>

    <div class="legend">
      <span><i class="dot dot-route"></i> 行路</span>
      <span><i class="dot dot-ake"></i> 明け</span>
      <span><i class="dot dot-off"></i> 休み</span>
    </div>

    <div class="summary" id="summary"></div>
    <div class="error" id="error"></div>
  </div>

  <div id="calendar"></div>

  <script>
    function createLocalDateFromInput(value) {
      if (!value) return null;
      const parts = value.split("-").map(Number);
      if (parts.length !== 3 || parts.some(Number.isNaN)) return null;
      const [y, m, d] = parts;
      return new Date(y, m - 1, d);
    }

    function diffDaysLocal(date1, date2) {
      const msPerDay = 1000 * 60 * 60 * 24;
      const t1 = new Date(date1.getFullYear(), date1.getMonth(), date1.getDate()).getTime();
      const t2 = new Date(date2.getFullYear(), date2.getMonth(), date2.getDate()).getTime();
      return Math.round((t1 - t2) / msPerDay);
    }

    function parsePattern(text) {
      return text
        .split(/\r?\n|,/)
        .map(s => s.trim())
        .filter(s => s !== "");
    }

    function classifyShift(shift) {
      if (shift === "明け") return "ake";
      if (shift.includes("休")) return "off";
      return "route";
    }

    function generate() {
      const errorEl = document.getElementById("error");
      const summaryEl = document.getElementById("summary");
      const calendarEl = document.getElementById("calendar");

      errorEl.textContent = "";
      summaryEl.textContent = "";
      calendarEl.innerHTML = "";

      const year = parseInt(document.getElementById("year").value, 10);
      const monthInput = parseInt(document.getElementById("month").value, 10);
      const month = monthInput - 1;
      const baseDate = createLocalDateFromInput(document.getElementById("baseDate").value);
      const startIndexInput = parseInt(document.getElementById("startIndex").value, 10);
      const startIndex = startIndexInput - 1;
      const pattern = parsePattern(document.getElementById("pattern").value);

      if (!Number.isInteger(year) || !Number.isInteger(monthInput) || monthInput < 1 || monthInput > 12) {
        errorEl.textContent = "年または月が不正です。";
        return;
      }

      if (!baseDate) {
        errorEl.textContent = "基準日を正しく入力してください。";
        return;
      }

      if (!Number.isInteger(startIndexInput) || startIndexInput < 1) {
        errorEl.textContent = "開始交番番号は1以上で入力してください。";
        return;
      }

      if (pattern.length === 0) {
        errorEl.textContent = "交番表を入力してください。";
        return;
      }

      if (startIndex >= pattern.length) {
        errorEl.textContent = "開始交番番号が交番表の件数を超えています。";
        return;
      }

      const week = ["日", "月", "火", "水", "木", "金", "土"];
      const grid = document.createElement("div");
      grid.className = "calendar";

      for (const w of week) {
        const header = document.createElement("div");
        header.className = "cell header";
        header.textContent = w;
        grid.appendChild(header);
      }

      const firstDay = new Date(year, month, 1);
      const startDay = firstDay.getDay();
      const lastDate = new Date(year, month + 1, 0).getDate();

      for (let i = 0; i < startDay; i++) {
        const blank = document.createElement("div");
        blank.className = "cell blank";
        grid.appendChild(blank);
      }

      let routeCount = 0;
      let akeCount = 0;
      let offCount = 0;

      for (let d = 1; d <= lastDate; d++) {
        const current = new Date(year, month, d);
        const diff = diffDaysLocal(current, baseDate);
        const index = ((startIndex + diff) % pattern.length + pattern.length) % pattern.length;
        const shift = pattern[index];
        const kind = classifyShift(shift);

        if (kind === "route") routeCount++;
        if (kind === "ake") akeCount++;
        if (kind === "off") offCount++;

        const cell = document.createElement("div");
        cell.className = "cell";

        const day = document.createElement("div");
        day.className = "day";
        day.textContent = d;

        const shiftLabel = document.createElement("div");
        shiftLabel.className = `shift ${kind}`;
        shiftLabel.textContent = shift;

        cell.appendChild(day);
        cell.appendChild(shiftLabel);
        grid.appendChild(cell);
      }

      summaryEl.innerHTML =
        `基準日 <strong>${document.getElementById("baseDate").value}</strong> は ` +
        `<strong>${pattern[startIndex]}</strong> として計算しています。<br>` +
        `行路日数: <strong>${routeCount}</strong> 日 / ` +
        `明け日数: <strong>${akeCount}</strong> 日 / ` +
        `休日日数: <strong>${offCount}</strong> 日 / ` +
        `交番表件数: <strong>${pattern.length}</strong> 件`;

      calendarEl.appendChild(grid);
    }

    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, "0");
    const dd = String(today.getDate()).padStart(2, "0");

    document.getElementById("year").value = yyyy;
    document.getElementById("month").value = today.getMonth() + 1;
    document.getElementById("baseDate").value = `${yyyy}-${mm}-${dd}`;
    document.getElementById("startIndex").value = 1;

    generate();
  </script>

</body>
</html>
